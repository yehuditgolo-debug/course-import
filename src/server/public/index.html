<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Content System — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0b1f20; --panel:#11302f; --panel2:#0f3d3e; --ink:#eaf3f2; --mut:#8fb3b1; --accent:#d4a017; --line:#1d4a49; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:'Heebo',system-ui,sans-serif; }
  header { padding:16px 22px; background:var(--panel2); display:flex; align-items:center; gap:16px; border-bottom:1px solid var(--line); }
  header h1 { font-size:20px; margin:0; font-weight:800; }
  header .stats { color:var(--mut); font-size:14px; }
  header .spacer { flex:1; }
  button { font-family:inherit; cursor:pointer; border:none; border-radius:8px; padding:8px 14px; font-weight:600; }
  .btn { background:var(--accent); color:#0b1f20; }
  .btn.ghost { background:transparent; color:var(--ink); border:1px solid var(--line); }
  .btn.sm { padding:4px 9px; font-size:12px; }
  .wrap { display:grid; grid-template-columns:340px 1fr; gap:0; height:calc(100vh - 59px); }
  .side { background:var(--panel); border-inline-end:1px solid var(--line); padding:18px; overflow:auto; }
  .main { padding:18px 22px; overflow:auto; }
  label { display:block; font-size:13px; color:var(--mut); margin:10px 0 4px; }
  input, textarea, select { width:100%; background:var(--bg); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:9px; font-family:inherit; font-size:14px; }
  textarea { min-height:90px; resize:vertical; }
  h2 { font-size:15px; text-transform:uppercase; letter-spacing:1px; color:var(--mut); margin:22px 0 10px; }
  .pipeline { display:grid; grid-template-columns:repeat(6,minmax(150px,1fr)); gap:10px; }
  .col { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:8px; min-height:120px; }
  .col h3 { margin:2px 4px 8px; font-size:12px; color:var(--mut); display:flex; justify-content:space-between; }
  .card { background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:8px; margin-bottom:8px; font-size:12px; }
  .card .t { font-weight:600; margin-bottom:4px; }
  .card .meta { color:var(--mut); font-size:11px; display:flex; justify-content:space-between; gap:6px; }
  .tag { display:inline-block; background:var(--bg); border:1px solid var(--line); border-radius:999px; padding:1px 8px; font-size:10px; }
  .card .row { display:flex; gap:5px; margin-top:6px; flex-wrap:wrap; }
  .cal { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .cal .day { background:var(--panel); border:1px solid var(--line); border-radius:8px; min-height:84px; padding:6px; font-size:11px; }
  .cal .day .dn { color:var(--mut); margin-bottom:4px; }
  .pip { background:var(--accent); color:#0b1f20; border-radius:5px; padding:2px 5px; margin-bottom:3px; font-size:10px; font-weight:600; }
  .integ span { font-size:11px; margin-inline-end:8px; }
  .on { color:#54d68a; } .off { color:#c76b6b; }
  a.view { color:var(--accent); text-decoration:none; }
  .muted { color:var(--mut); font-size:12px; }
  .tabs { display:flex; gap:8px; margin-bottom:6px; }
  .tab { background:transparent; color:var(--mut); border:1px solid var(--line); border-radius:999px; padding:6px 18px; }
  .tab.active { background:var(--accent); color:#0b1f20; border-color:var(--accent); font-weight:800; }
  .agents-stats { display:flex; gap:14px; margin:10px 0 14px; }
  .stat { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px 18px; min-width:120px; }
  .stat .n { font-size:26px; font-weight:800; }
  .stat .l { font-size:12px; color:var(--mut); }
  table.agents { width:100%; border-collapse:collapse; background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  table.agents th, table.agents td { padding:10px 12px; text-align:start; font-size:13px; border-bottom:1px solid var(--line); }
  table.agents th { color:var(--mut); font-size:11px; text-transform:uppercase; letter-spacing:1px; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-inline-end:6px; }
  .dot.on_track { background:#54d68a; } .dot.needs_attention { background:#e06c6c; }
  .dot.overdue { background:#e0b56c; } .dot.idle { background:#7a9c9a; } .dot.planned { background:#445e5d; }
  .hist { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px 12px; margin-bottom:6px; font-size:12px; display:flex; gap:10px; align-items:baseline; }
  .hist .when { color:var(--mut); min-width:150px; }
  .ok { color:#54d68a; } .fail { color:#e06c6c; }
</style>
</head>
<body>
<header>
  <h1>🛠️ Content System</h1>
  <span class="stats" id="stats"></span>
  <span class="integ" id="integ"></span>
  <span class="spacer"></span>
  <button class="btn ghost sm" id="langToggle">EN / עב</button>
</header>

<div class="wrap">
  <aside class="side">
    <h2 data-i18n="new">פוסט ליבה חדש</h2>
    <label data-i18n="lang">שפה</label>
    <select id="f-lang"><option value="he">עברית</option><option value="en">English</option></select>
    <label data-i18n="hook1">הוק ראשי</label>
    <input id="f-hook1" placeholder="...">
    <label data-i18n="hook2">הוק משני</label>
    <input id="f-hook2" placeholder="...">
    <label data-i18n="body">גוף הפוסט</label>
    <textarea id="f-body" placeholder="..."></textarea>
    <label>CTA</label>
    <input id="f-cta" placeholder="...">
    <div style="margin-top:14px; display:flex; gap:8px;">
      <button class="btn" id="create" data-i18n="create">צור + שכפל</button>
    </div>
    <p class="muted" id="hint" style="margin-top:10px"></p>

    <h2 data-i18n="posts">פוסטי ליבה</h2>
    <div id="postList"></div>
  </aside>

  <main class="main">
    <nav class="tabs">
      <button class="tab active" data-tab="content" data-i18n="tabContent">תוכן</button>
      <button class="tab" data-tab="agents" data-i18n="tabAgents">סוכנים</button>
    </nav>

    <section id="view-content">
      <h2 data-i18n="pipelineH">פייפליין לפי סטטוס</h2>
      <div class="pipeline" id="pipeline"></div>

      <h2 data-i18n="calH">לוח פרסום</h2>
      <div class="cal" id="cal"></div>
    </section>

    <section id="view-agents" style="display:none">
      <h2 data-i18n="agentsH">כל סוכן במערכת — מה רץ, מה לא, מה צריך את העיניים שלך</h2>
      <div class="agents-stats" id="agentsStats"></div>
      <table class="agents">
        <thead><tr>
          <th data-i18n="thStatus">סטטוס</th><th data-i18n="thAgent">סוכן</th><th>CODE</th>
          <th data-i18n="thSchedule">תזמון</th><th data-i18n="thLast">ריצה אחרונה</th>
          <th data-i18n="thOutput">פלט אחרון</th><th></th>
        </tr></thead>
        <tbody id="agentsBody"></tbody>
      </table>
      <h2 data-i18n="historyH">היסטוריית ריצות</h2>
      <div id="agentHistory"></div>
    </section>
  </main>
</div>

<script src="/app.js"></script>
</body>
</html>
